<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ハイエース200系 整備ガイド | TrailFusion AI</title>
<meta name="description" content="ハイエース200系ディーゼルの整備記録。症状から原因をすぐ診断。整備項目一覧表から各ガイドへ移動できます。">
<style>
body{margin:0;background:#fffbf2;color:#1f2e4d;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:grid;min-height:100vh;place-items:center;text-align:center;padding:24px}.box{max-width:560px;background:#fff;border:3px solid #1f2e4d;border-radius:28px;box-shadow:8px 8px 0 #1f2e4d;padding:28px}a{display:inline-flex;margin-top:16px;padding:14px 22px;border:3px solid #1f2e4d;border-radius:999px;background:#ff6b5b;color:#fff;font-weight:900;text-decoration:none;box-shadow:5px 5px 0 #1f2e4d}
</style>
</head>
<body>
<div class="box" id="fallback">
  <h1>整備記録を読み込み中です</h1>
  <p>表示されない場合は下のボタンから整備項目へ移動できます。</p>
  <a href="#items">整備項目を見る</a>
</div>
<script>
(async()=>{
  const source='https://raw.githubusercontent.com/hiroakiyasa/homepage/dfe7aba9f7191c3d73aa870b069b1bef3943952e/maintenance.html';
  try{
    let html=await fetch(source,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(r.status);return r.text()});
    html=html.replace(
      '<h1 class="hero-title">愛車、今日はどんな<br><span class="underline">「声」</span>してる？</h1>',
      '<h1 class="hero-title"><span class="hero-title-nowrap">愛車、今日はどんな</span><br><span class="underline">「声」</span>してる？</h1>'
    );
    html=html.replace('</style>', `.hero-title-nowrap{white-space:nowrap;display:inline-block}@media(max-width:900px){.hero-title{font-size:clamp(1.9rem,9.4vw,3rem)!important;letter-spacing:-.055em}.hero-title-nowrap{white-space:nowrap;display:inline-block}}@media(max-width:380px){.hero-title{font-size:clamp(1.72rem,8.8vw,2.55rem)!important}}</style>`);
    document.open();
    document.write(html);
    document.close();
  }catch(e){
    document.getElementById('fallback').innerHTML='<h1>整備記録</h1><p>ページの読み込みに失敗しました。</p><a href="index.html">ホームへ戻る</a>';
  }
})();
</script>
</body>
</html>
