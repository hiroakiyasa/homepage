<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>西元町 - 地図</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #map { width: 100%; height: 100%; }

    .custom-marker {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .custom-marker:hover {
      transform: scale(1.2);
      z-index: 1000;
    }

    /* コンビニロゴマーカー */
    .convenience-logo-marker {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: white;
      border: 2px solid #4caf50;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      padding: 4px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .convenience-logo-marker:hover {
      transform: scale(1.2);
      z-index: 1000;
    }

    .convenience-logo-marker img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .marker-center { background: #d32f2f; }
    .marker-parking { background: #1976d2; }
    .marker-toilet { background: #795548; }
    .marker-onsen { background: #f8bbd0; }
    .marker-restaurant { background: #ff9800; }

    .leaflet-popup-content { min-width: 200px; }
    .popup-title { font-weight: bold; font-size: 14px; margin-bottom: 6px; }
    .popup-info { font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 地図初期化
    const map = L.map('map').setView([34.6841801, 135.1798487], 15);

    // OpenStreetMap タイル
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 19
    }).addTo(map);

    // マーカーデータ
    const markers = [

        "color": "#d32f2f"
    },
    {

        "id": "parking_0",
        "lat": 34.686346,
        "lng": 135.181252,
        "title": "コインパーク北長狭通６丁目",

        "distance": "273m",
        "walking": "徒歩約4分",
        "color": "#1976d2"
    },
    {

    },
    {

        "color": "#1976d2"
    },
    {
        "type": "parking",
        "id": "parking_3",
        "lat": 34.682296,
        "lng": 135.178014,
        "title": "スカイパーク　パート４０",
        "number": 4,
        "distance": "269m",
        "walking": "徒歩約4分",
        "color": "#1976d2"
    },
    {
        "type": "parking",
        "id": "parking_4",
        "lat": 34.688488,
        "lng": 135.179852,
        "title": "Ｏｎｅ　Ｐａｒｋ　栄昌",
        "number": 5,
        "distance": "480m",
        "walking": "徒歩約6分",
        "color": "#1976d2"
    },
    {
        "type": "parking",
        "id": "parking_5",
        "lat": 34.688221,
        "lng": 135.180152,
        "title": "Ｏｎｅ　Ｐａｒｋ　花隈町",
        "number": 6,
        "distance": "451m",
        "walking": "徒歩約6分",
        "color": "#1976d2"
    },
    {
        "type": "parking",
        "id": "parking_6",
        "lat": 34.687446,
        "lng": 135.181602,
        "title": "リパーク神戸花隈町第４",
        "number": 7,
        "distance": "397m",
        "walking": "徒歩約5分",
        "color": "#1976d2"
    },
    {
        "type": "parking",
        "id": "parking_7",
        "lat": 34.68383,
        "lng": 135.180741,
        "title": "ビジネスパーク元町通",
        "number": 8,

    {

        "title": "神戸駅南駐車場",
        "number": 9,
        "distance": "437m",

    },
    {
        "type": "parking",
        "id": "parking_9",
        "lat": 34.685613,
        "lng": 135.183641,
        "title": "和田パーキングＮＯ５０",
        "number": 10,
        "distance": "382m",
        "walking": "徒歩約5分",
        "color": "#1976d2"
    },
    {
        "type": "restaurant",
        "id": "restaurant_0",
        "lat": 34.682634037085556,
        "lng": 135.18410457634798,
        "title": "鉄板焼 心",
        "number": 1,
        "genre": "鉄板焼き",
        "address": "兵庫県神戸市中央区波止場町7-2 ホテル ラ・スイート神戸ハーバーランド 2F",
        "color": "#ff9800"
    },
    {

        "id": "restaurant_1",
        "lat": 34.6851074370823,
        "lng": 135.17882767637667,

        "number": 2,

    },
    {
        "type": "restaurant",
        "id": "restaurant_2",
        "lat": 34.68530833708232,
        "lng": 135.17925417637844,
        "title": "満月",
        "number": 3,
        "genre": "焼肉",
        "address": "兵庫県神戸市中央区下山手通8-7-3",
        "color": "#ff9800"
    },
    {
        "type": "restaurant",
        "id": "restaurant_3",
        "lat": 34.68577533708238,
        "lng": 135.1804355763823,
        "title": "鷹楽園",
        "number": 4,
        "genre": "中華料理",
        "address": "兵庫県神戸市中央区北長狭通7-1-27 ナカハラマンション 202",
        "color": "#ff9800"
    },
    {
        "type": "restaurant",
        "id": "restaurant_4",
        "lat": 34.68508813708326,
        "lng": 135.1817957763744,
        "title": "ママのえらんだ元町ケーキ 元町本店",
        "number": 5,
        "genre": "ケーキ",
        "address": "兵庫県神戸市中央区元町通5-5-1",
        "color": "#ff9800"
    }
];

    // マーカーオブジェクトを保存
    const markerObjects = {};

    // アイコン取得関数
    function getMarkerIcon(type, number) {
      if (type === 'parking' && number) {
        return number;
      }
      if (type === 'restaurant' && number) {
        return number;
      }
      const icons = {
        center: '📍',
        parking: '🅿️',
        toilet: '🚻',
        onsen: '♨️',
        restaurant: '🍴'
      };
      return icons[type] || '📌';
    }

    // マーカーを作成
    markers.forEach(markerData => {
      let icon;
      let zIndexOffset = 0;

      // z-indexの設定（駐車場を最前面に）
      if (markerData.type === 'parking') {
        zIndexOffset = 1000;
      } else if (markerData.type === 'center') {
        zIndexOffset = 900;
      } else if (markerData.type === 'restaurant') {
        zIndexOffset = 800;
      } else if (markerData.type === 'convenience') {
        zIndexOffset = 700;
      } else if (markerData.type === 'toilet') {
        zIndexOffset = 600;
      } else if (markerData.type === 'onsen') {
        zIndexOffset = 500;
      }

      // コンビニの場合はロゴ画像を使用（Base64埋め込み）
      if (markerData.type === 'convenience' && markerData.logo) {
        icon = L.divIcon({
          className: 'custom-icon',
          html: `<div class="convenience-logo-marker"><img src="${markerData.logo}" alt="${markerData.subType}"></div>`,
          iconSize: [40, 40],
          iconAnchor: [20, 20]
        });
      } else {
        // その他のマーカーは従来通り
        icon = L.divIcon({
          className: 'custom-icon',
          html: `<div class="custom-marker marker-${markerData.type}" style="background-color: ${markerData.color}">${getMarkerIcon(markerData.type, markerData.number)}</div>`,
          iconSize: [40, 40],
          iconAnchor: [20, 20]
        });
      }

      // マーカー作成（zIndexOffsetを指定）
      const marker = L.marker([markerData.lat, markerData.lng], {
        icon: icon,
        zIndexOffset: zIndexOffset
      }).addTo(map);

      // ポップアップ内容
      let popupContent = `<div class="popup-title">${markerData.title}</div>`;

      if (markerData.subType) {
        popupContent += `<div class="popup-info">🏪 ${markerData.subType}</div>`;
      }
      if (markerData.description) {
        popupContent += `<div class="popup-info">${markerData.description}</div>`;
      }
      if (markerData.distance) {
        popupContent += `<div class="popup-info">📍 ${markerData.distance}</div>`;
      }
      if (markerData.walking) {
        popupContent += `<div class="popup-info">🚶 ${markerData.walking}</div>`;
      }
      if (markerData.genre) {
        popupContent += `<div class="popup-info">🍽️ ${markerData.genre}</div>`;
      }
      if (markerData.address) {
        popupContent += `<div class="popup-info" style="margin-top: 4px;">${markerData.address}</div>`;
      }

      marker.bindPopup(popupContent);

      // マーカーオブジェクトを保存
      markerObjects[markerData.id] = marker;
    });

    // 外部から呼び出せる関数
    window.showMarker = function(markerId) {
      const marker = markerObjects[markerId];
      if (marker) {
        // アニメーションで地図を移動
        map.setView(marker.getLatLng(), 17, {
          animate: true,
          duration: 0.5
        });
        marker.openPopup();
      }
    };
  </script>
</body>
</html>
