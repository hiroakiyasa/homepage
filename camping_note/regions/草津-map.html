<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>草津 - 地図</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #map { width: 100%; height: 100%; }

    .custom-marker {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .custom-marker:hover {
      transform: scale(1.2);
      z-index: 1000;
    }

    /* コンビニロゴマーカー */
    .convenience-logo-marker {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: white;
      border: 2px solid #4caf50;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      padding: 4px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .convenience-logo-marker:hover {
      transform: scale(1.2);
      z-index: 1000;
    }

    .convenience-logo-marker img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .marker-center { background: #d32f2f; }
    .marker-parking { background: #1976d2; }
    .marker-toilet { background: #795548; }
    .marker-onsen { background: #f8bbd0; }
    .marker-restaurant { background: #ff9800; }

    .leaflet-popup-content { min-width: 200px; }
    .popup-title { font-weight: bold; font-size: 14px; margin-bottom: 6px; }
    .popup-info { font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 地図初期化
    const map = L.map('map').setView([35.01411565453141, 135.95767458991293], 15);

    // OpenStreetMap タイル
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 19
    }).addTo(map);

    // マーカーデータ
    const markers = [
    {
        "type": "center",
        "id": "area_center",
        "lat": 35.01411565453141,
        "lng": 135.95767458991293,
        "title": "草津",
        "description": "周辺のおすすめ車中泊スポット",
        "color": "#d32f2f"
    },
    {
        "type": "parking",
        "id": "parking_0",
        "lat": 35.012422,
        "lng": 135.961583,
        "title": "タイムズ常善寺",
        "number": 1,
        "distance": "403m",
        "walking": "徒歩約6分",
        "color": "#1976d2"
    },
    {
        "type": "convenience",
        "id": "convenience_0_0",
        "lat": 35.01367825,
        "lng": 135.96305235,
        "title": "セブン‐イレブン 草津中学校前店",
        "subType": "その他",
        "logo": null
    },
    {
        "type": "onsen",
        "id": "onsen_0_0",
        "lat": 35.019747,
        "lng": 135.96291,
        "title": "桜湯",
        "distance": "0.8km",
        "color": "#f8bbd0"
    },
    {
        "type": "onsen",
        "id": "onsen_0_1",
        "lat": 35.012558,
        "lng": 135.977585,
        "title": "ヤマキ酒店 ほっこり足湯",
        "distance": "1.5km",
        "color": "#f8bbd0"
    },
    {
        "type": "onsen",
        "id": "onsen_0_2",
        "lat": 34.997898,
        "lng": 135.967499,
        "title": "草津市立 長寿の郷 ロクハ荘",
        "distance": "1.7km",
        "color": "#f8bbd0"
    },
    {
        "type": "parking",
        "id": "parking_1",
        "lat": 35.013075,
        "lng": 135.961228,
        "title": "タイムズ常善寺第２",
        "number": 2,
        "distance": "344m",
        "walking": "徒歩約5分",
        "color": "#1976d2"
    },
    {
        "type": "convenience",
        "id": "convenience_1_0",
        "lat": 35.01367825,
        "lng": 135.96305235,
        "title": "セブン‐イレブン 草津中学校前店",
        "subType": "その他",
        "logo": null
    },
    {
        "type": "onsen",
        "id": "onsen_1_0",
        "lat": 35.019747,
        "lng": 135.96291,
        "title": "桜湯",
        "distance": "0.8km",
        "color": "#f8bbd0"
    },
    {
        "type": "onsen",
        "id": "onsen_1_1",
        "lat": 35.012558,
        "lng": 135.977585,
        "title": "ヤマキ酒店 ほっこり足湯",
        "distance": "1.5km",
        "color": "#f8bbd0"
    },
    {
        "type": "onsen",
        "id": "onsen_1_2",
        "lat": 34.997898,
        "lng": 135.967499,
        "title": "草津市立 長寿の郷 ロクハ荘",
        "distance": "1.8km",
        "color": "#f8bbd0"
    },
    {
        "type": "parking",
        "id": "parking_2",
        "lat": 35.016285,
        "lng": 135.959872,
        "title": "ＮＰＣ２４Ｈ草津本陣パーキング",
        "number": 3,
        "distance": "314m",
        "walking": "徒歩約4分",
        "color": "#1976d2"
    },
    {
        "type": "onsen",
        "id": "onsen_2_0",
        "lat": 35.019747,
        "lng": 135.96291,
        "title": "桜湯",
        "distance": "0.5km",
        "color": "#f8bbd0"
    },
    {
        "type": "onsen",
        "id": "onsen_2_1",
        "lat": 35.012558,
        "lng": 135.977585,
        "title": "ヤマキ酒店 ほっこり足湯",
        "distance": "1.7km",
        "color": "#f8bbd0"
    },
    {
        "type": "restaurant",
        "id": "restaurant_0",
        "lat": 35.01696503712046,
        "lng": 135.96047517918083,
        "title": "馳走 とし藤",
        "number": 1,
        "genre": "日本料理",
        "address": "滋賀県草津市草津2-7-30",
        "color": "#ff9800"
    },
    {
        "type": "restaurant",
        "id": "restaurant_1",
        "lat": 35.01431470973658,
        "lng": 135.9577506812724,
        "title": "料理屋まつ瀬",
        "number": 2,
        "genre": "日本料理",
        "address": "滋賀県草津市草津3-12-3 旧山内邸内",
        "color": "#ff9800"
    }
];

    // マーカーオブジェクトを保存
    const markerObjects = {};

    // アイコン取得関数
    function getMarkerIcon(type, number) {
      if (type === 'parking' && number) {
        return number;
      }
      if (type === 'restaurant' && number) {
        return number;
      }
      const icons = {
        center: '📍',
        parking: '🅿️',
        toilet: '🚻',
        onsen: '♨️',
        restaurant: '🍴'
      };
      return icons[type] || '📌';
    }

    // マーカーを作成
    markers.forEach(markerData => {
      let icon;
      let zIndexOffset = 0;

      // z-indexの設定（駐車場を最前面に）
      if (markerData.type === 'parking') {
        zIndexOffset = 1000;
      } else if (markerData.type === 'center') {
        zIndexOffset = 900;
      } else if (markerData.type === 'restaurant') {
        zIndexOffset = 800;
      } else if (markerData.type === 'convenience') {
        zIndexOffset = 700;
      } else if (markerData.type === 'toilet') {
        zIndexOffset = 600;
      } else if (markerData.type === 'onsen') {
        zIndexOffset = 500;
      }

      // コンビニの場合はロゴ画像を使用（Base64埋め込み）
      if (markerData.type === 'convenience' && markerData.logo) {
        icon = L.divIcon({
          className: 'custom-icon',
          html: `<div class="convenience-logo-marker"><img src="${markerData.logo}" alt="${markerData.subType}"></div>`,
          iconSize: [40, 40],
          iconAnchor: [20, 20]
        });
      } else {
        // その他のマーカーは従来通り
        icon = L.divIcon({
          className: 'custom-icon',
          html: `<div class="custom-marker marker-${markerData.type}" style="background-color: ${markerData.color}">${getMarkerIcon(markerData.type, markerData.number)}</div>`,
          iconSize: [40, 40],
          iconAnchor: [20, 20]
        });
      }

      // マーカー作成（zIndexOffsetを指定）
      const marker = L.marker([markerData.lat, markerData.lng], {
        icon: icon,
        zIndexOffset: zIndexOffset
      }).addTo(map);

      // ポップアップ内容
      let popupContent = `<div class="popup-title">${markerData.title}</div>`;

      if (markerData.subType) {
        popupContent += `<div class="popup-info">🏪 ${markerData.subType}</div>`;
      }
      if (markerData.description) {
        popupContent += `<div class="popup-info">${markerData.description}</div>`;
      }
      if (markerData.distance) {
        popupContent += `<div class="popup-info">📍 ${markerData.distance}</div>`;
      }
      if (markerData.walking) {
        popupContent += `<div class="popup-info">🚶 ${markerData.walking}</div>`;
      }
      if (markerData.genre) {
        popupContent += `<div class="popup-info">🍽️ ${markerData.genre}</div>`;
      }
      if (markerData.address) {
        popupContent += `<div class="popup-info" style="margin-top: 4px;">${markerData.address}</div>`;
      }

      marker.bindPopup(popupContent);

      // マーカーオブジェクトを保存
      markerObjects[markerData.id] = marker;
    });

    // 外部から呼び出せる関数
    window.showMarker = function(markerId) {
      const marker = markerObjects[markerId];
      if (marker) {
        // アニメーションで地図を移動
        map.setView(marker.getLatLng(), 17, {
          animate: true,
          duration: 0.5
        });
        marker.openPopup();
      }
    };
  </script>
</body>
</html>
